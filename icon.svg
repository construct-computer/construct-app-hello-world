<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#shine)"/>
  <!-- Wrench icon -->
  <g transform="translate(128,128)" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wrench body -->
    <path d="M-20,-55 A40,40 0 0,1 25,-20 L-20,35 L-55,0 Z" opacity="0.9" fill="rgba(255,255,255,0.15)"/>
    <!-- Curly braces { } -->
    <text x="0" y="12" text-anchor="middle" font-family="monospace" font-weight="700" font-size="80" fill="white" stroke="none" opacity="0.95">{ }</text>
  </g>
</svg>
